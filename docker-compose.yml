version: '3.8'

services:
  backend:
    build:
      context: ./verba--AI_dubber
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - ./verba--AI_dubber/workspace:/app/workspace

  frontend:
    build:
      context: ./verba--AI_dubber
      dockerfile: Dockerfile.frontend
    ports:
      - "8501:8501"
    depends_on:
      - backend